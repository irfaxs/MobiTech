{% extends 'base/base.html' %}
{% block content %}

<div class="auth-container">


<div class="auth-card">

    <h2>Forgot Password</h2>
    <p class="text-muted">Enter your email to receive OTP</p>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="email" placeholder="Enter your email" required>

        <button type="submit">Send OTP</button>

    </form>

</div>


</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.auth-card {
    width: 400px;
    padding: 40px;
    background: white;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

.auth-card h2 {
    font-weight: 700;
}

.auth-card input {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.auth-card button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#28a745,#1e7e34);
    color: white;
    font-weight: 600;
}
</style>

{% endblock %}

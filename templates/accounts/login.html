{% extends 'base/base.html' %}

{% block content %}

<div class="auth-container">


<div class="auth-card">

    <h2>Welcome Back 👋</h2>
    <p class="text-muted">Login to your account</p>

    <form method="POST">
        {% csrf_token %}
        
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <!-- 🔐 FORGOT PASSWORD -->
        <div class="text-end mt-2">
            <a href="{% url 'accounts:forgot_password' %}" class="forgot-link">
                Forgot Password?
            </a>
        </div>

        <button type="submit">Login</button>
    </form>

    <p class="mt-3">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </p>

</div>


</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.auth-card {
    width: 400px;
    padding: 40px;
    background: white;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

.auth-card h2 {
    font-weight: 700;
}

.auth-card input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.auth-card button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#28a745,#1e7e34);
    color: white;
    font-weight: 600;
    transition: 0.3s;
}

.auth-card button:hover {
    transform: translateY(-2px);
}

.forgot-link {
    font-size: 14px;
    text-decoration: none;
    color: #28a745;
}

.forgot-link:hover {
    text-decoration: underline;
}
</style>

{% endblock %}

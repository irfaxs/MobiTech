</div>

<style>

/* OPTION CARDS */
.option-card {
    border: 2px solid #eee;
    padding: 12px;
    border-radius: 10px;
    margin: 8px 0;
    cursor: pointer;
    transition: 0.3s;
}

.option-card:hover {
    border-color: #28a745;
}

.option-card.active {
    border: 2px solid #28a745;
    background: #eafaf1;
}

/* SUMMARY */
.summary-box {
    background: #fff;
}

</style>

<script>

let basePrice = parseInt("{{ variant.price }}");

let deductions = {
    call: 0,
    screen: 0
};

// initial price
document.getElementById("finalPrice").innerText = basePrice;

function selectOption(element, question, value) {

    let parent = element.parentElement;

    parent.querySelectorAll('.option-card').forEach(el => {
        el.classList.remove('active');
    });

    element.classList.add('active');

    basePrice = basePrice - deductions[question];
    deductions[question] = value;
    basePrice = basePrice + value;

    document.getElementById("finalPrice").innerText = basePrice;
}

function goToResult() {

    if (basePrice <= 0) {
        alert("Please select valid options");
        return;
    }

    let url = "{% url 'result' device.brand.name device.name %}";

    window.location.href = url + "?variant_id={{ variant.id }}&price=" + basePrice;
}

</script>

{% endblock %}

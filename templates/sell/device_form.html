{% extends 'base/base.html' %}
{% block content %}

<div class="container mt-5">


<div class="form-card">

    <h3 class="fw-bold mb-4 text-center">
        {% if object %}
            ✏️ Edit Device
        {% else %}
            ➕ Add New Device
        {% endif %}
    </h3>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- BRAND -->
        <div class="mb-3">
            <label class="form-label">Brand</label>
            {{ form.brand }}
        </div>

        <!-- NAME -->
        <div class="mb-3">
            <label class="form-label">Device Name</label>
            {{ form.name }}
        </div>

        <!-- IMAGE -->
        <div class="mb-3">
            <label class="form-label">Image</label>
            {{ form.image }}
        </div>

        <!-- BASE PRICE -->
        <div class="mb-3">
            <label class="form-label">Base Price</label>
            {{ form.base_price }}
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn btn-dark w-100 mt-3">
            Save Device
        </button>

    </form>

</div>


</div>

<style>
.form-card {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
</style>

{% endblock %}

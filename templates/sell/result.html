{% block content %}

</div>

<style>

/* CARD */
.result-card {
    background: #ffffff;
    padding: 45px 30px;
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.result-card:hover {
    transform: translateY(-6px);
}

/* IMAGE */
.img-box {
    background: #f7f9fb;
    padding: 25px;
    border-radius: 16px;
    margin-bottom: 20px;
}

.img-box img {
    max-height: 200px;
    object-fit: contain;
}

/* TEXT */
.device-name {
    font-weight: 700;
    margin-bottom: 5px;
}

.variant-text {
    color: #777;
    margin-bottom: 15px;
}

/* PRICE */
.price {
    font-size: 42px;
    font-weight: 800;
    color: #198754;
    margin-bottom: 5px;
}

.price-subtext {
    font-size: 14px;
    color: #888;
}

/* BADGES */
.badges {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
    font-size: 13px;
    color: #555;
}

/* BUTTON */
.book-btn {
    width: 100%;
    background: linear-gradient(135deg, #0d6efd, #0056d2);
    color: white;
    padding: 14px;
    border-radius: 12px;
    font-weight: 600;
    transition: 0.3s;
}

.book-btn:hover {
    transform: translateY(-2px);
    background: #0056d2;
}

</style>

<script>
function goToBooking(){

    let url = "{% url 'booking' device.brand.name device.name %}";
    window.location.href = url + "?variant_id={{ variant.id }}&price={{ price }}";
}
</script>

{% endblock %}

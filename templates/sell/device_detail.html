{% extends 'base/base.html' %}
{% block content %}

<div class="container mt-5">

    <div class="row align-items-center">

        <!-- LEFT IMAGE -->
        <div class="col-md-5 text-center">
            <div class="image-box p-4">
                <img src="{{ device.image.url }}" class="img-fluid">
            </div>
        </div>

        <!-- RIGHT DETAILS -->
        <div class="col-md-7">

            <h2 class="fw-bold mb-2">{{ device.name }}</h2>

            <h3 class="price-text mb-3">
                ₹ <span id="price">{{ device.base_price }}</span>
            </h3>

            <p class="text-muted">Get the best resale value instantly</p>

            <!-- BUTTON -->
            <button class="btn premium-btn mt-3" onclick="goToQuestions()">
                Get Exact Value →
            </button>

            {% if user.is_staff %}
<div class="mt-3">

    <a href="{% url 'device_update' device.id %}" class="btn btn-warning btn-sm">
        Edit Device
    </a>

    <a href="{% url 'device_delete' device.id %}" class="btn btn-danger btn-sm">
        Delete Device
    </a>

</div>
{% endif %}

        </div>

    </div>

    <!-- VARIANTS -->
    <div class="mt-5">

        <h5 class="fw-semibold mb-3">Choose Variant</h5>

        <div class="variant-container">

            {% for variant in variants %}
            <div class="variant-card"
                 data-id="{{ variant.id }}"
                 data-price="{{ variant.price }}"
                 onclick="selectVariant(this)">

                {{ variant.name }}

            </div>
            {% endfor %}

        </div>

    </div>

</div>

<!-- PREMIUM CSS -->
<style>

.image-box {
    background: #f7f9fb;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.image-box img {
    max-height: 320px;
    object-fit: contain;
}

/* PRICE */
.price-text {
    color: #1a7f5a;
    font-weight: 700;
    font-size: 32px;
}

/* BUTTON */
.premium-btn {
    background: linear-gradient(135deg, #28a745, #1e7e34);
    color: white;
    padding: 12px 28px;
    border-radius: 12px;
    font-weight: 600;
    border: none;
    transition: 0.3s;
}

.premium-btn:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #1e7e34, #145c2a);
}

/* VARIANTS */
.variant-container {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.variant-card {
    padding: 12px 22px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    transition: 0.25s;
    font-weight: 500;
}

.variant-card:hover {
    border-color: #28a745;
}

.variant-card.active {
    border: 2px solid #28a745;
    background: #eafaf1;
    color: #1e7e34;
    font-weight: 600;
}

</style>

<!-- JS -->
<script>

let selectedVariant = null;

function selectVariant(element) {

    const price = element.getAttribute("data-price");
    const variantId = element.getAttribute("data-id");

    selectedVariant = variantId;

    // remove active
    document.querySelectorAll('.variant-card').forEach(el => {
        el.classList.remove('active');
    });

    // add active
    element.classList.add('active');

    // update price
    document.getElementById("price").innerText = price;
}

function goToQuestions() {

    if (!selectedVariant) {
        alert("Please select a variant");
        return;
    }

    let url = "{% url 'questions' device.brand.name device.name %}";
    console.log("GOING TO:", url);  // ✅ DEBUG

    window.location.href = url + "?variant_id=" + selectedVariant;
}

// auto select first
window.onload = function() {
    let first = document.querySelector('.variant-card');
    if (first) {
        first.click();
    }
}

</script>

{% endblock %}

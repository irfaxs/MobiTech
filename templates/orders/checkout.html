{% extends 'base/base.html' %}

{% block content %}

<div class="container mt-5">

<h2 class="fw-bold mb-4">Checkout</h2>

<div class="row">

    <!-- LEFT -->
    <div class="col-md-7">

        <div class="card p-4 shadow-sm">

            <h5>Delivery Address</h5>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email" required>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
                    </div>

                    <div class="mb-3">
                        <textarea name="address" class="form-control" rows="3" placeholder="Address" required></textarea>
                    </div>
                

                <button id="pay-btn" class="btn btn-dark mt-3 w-100">
                    Pay Now
                </button>

            </form>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="col-md-5">

        <div class="card p-4 shadow-sm">

            <h5>Order Summary</h5>

            {% for item in cart_items %}
            <div class="d-flex justify-content-between">
                <span>{{ item.product.name }}</span>
                <span>₹ {{ item.total_price }}</span>
            </div>
            {% endfor %}

            <hr>

            <h4>Total: ₹ {{ total }}</h4>

        </div>

    </div>

</div>

</div>

<!-- RAZORPAY -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "rzp_test_SXmYjsueDsovRq",
    "amount": "{{ payment.amount }}",
    "currency": "INR",
    "name": "MobiTech",
    "description": "Order Payment",
    "order_id": "{{ payment.id }}",

    "handler": function (response){
        window.location.href = "/orders/success/?payment_id=" + response.razorpay_payment_id;
    }
};

var rzp = new Razorpay(options);

document.getElementById('pay-btn').onclick = function(e){
    e.preventDefault();
    rzp.open();
}
</script>

{% endblock %}
